<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rabbit-Hole Blocker</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <svg class="logo" width="32" height="32" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <ellipse class="ear ear-left" cx="22" cy="14" rx="6" ry="14" fill="#2dd4a8" stroke="#1a1a1a"
          stroke-width="1.5" />
        <ellipse cx="22" cy="14" rx="3" ry="10" fill="#f0a868" />
        <ellipse class="ear ear-right" cx="42" cy="14" rx="6" ry="14" fill="#2dd4a8" stroke="#1a1a1a"
          stroke-width="1.5" />
        <ellipse cx="42" cy="14" rx="3" ry="10" fill="#f0a868" />
        <circle cx="32" cy="38" r="18" fill="#2dd4a8" stroke="#1a1a1a" stroke-width="1.5" />
        <circle cx="26" cy="34" r="3" fill="#1a1a1a" />
        <circle cx="27" cy="33" r="1" fill="#ffffff" />
        <circle cx="38" cy="34" r="3" fill="#1a1a1a" />
        <circle cx="39" cy="33" r="1" fill="#ffffff" />
        <ellipse cx="32" cy="40" rx="2.5" ry="2" fill="#f0a868" />
        <path d="M29 43 Q32 46 35 43" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round" />
        <circle cx="20" cy="40" r="4" fill="#f0a868" opacity="0.5" />
        <circle cx="44" cy="40" r="4" fill="#f0a868" opacity="0.5" />
      </svg>
      <h1>Rabbit-Hole Blocker</h1>
    </div>
    <p class="subtitle">Block distractions on YouTube &amp; Reddit</p>

    <div class="toggle-row master-toggle">
      <label class="switch">
        <input type="checkbox" id="toggle">
        <span class="slider"></span>
      </label>
      <span class="status" id="status">Enabled</span>
    </div>

    <div class="section-label">Sites</div>

    <div class="site-group" id="youtube-group">
      <div class="site-row" id="youtube-row">
        <svg class="site-icon" width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M23.5 6.2C23.2 5.1 22.4 4.3 21.3 4C19.4 3.5 12 3.5 12 3.5C12 3.5 4.6 3.5 2.7 4C1.6 4.3 0.8 5.1 0.5 6.2C0 8.1 0 12 0 12C0 12 0 15.9 0.5 17.8C0.8 18.9 1.6 19.7 2.7 20C4.6 20.5 12 20.5 12 20.5C12 20.5 19.4 20.5 21.3 20C22.4 19.7 23.2 18.9 23.5 17.8C24 15.9 24 12 24 12C24 12 24 8.1 23.5 6.2Z"
            fill="#FF0000" />
          <path d="M9.5 15.5L16 12L9.5 8.5V15.5Z" fill="#FFFFFF" />
        </svg>
        <span class="site-label">YouTube</span>
        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 9L12 15L18 9" stroke="#888888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <label class="switch switch-sm">
          <input type="checkbox" id="toggle-youtube">
          <span class="slider"></span>
        </label>
      </div>
      <div class="element-list" id="youtube-elements">
        <label class="element-item">
          <input type="checkbox" id="yt-feed" class="element-checkbox">
          <span class="checkmark"></span>
          <span class="element-label">Homepage Feed</span>
        </label>
        <label class="element-item">
          <input type="checkbox" id="yt-sidebar" class="element-checkbox">
          <span class="checkmark"></span>
          <span class="element-label">Sidebar Recommendations</span>
        </label>
        <label class="element-item">
          <input type="checkbox" id="yt-comments" class="element-checkbox">
          <span class="checkmark"></span>
          <span class="element-label">Comments</span>
        </label>
        <label class="element-item">
          <input type="checkbox" id="yt-shorts" class="element-checkbox">
          <span class="checkmark"></span>
          <span class="element-label">Shorts</span>
        </label>
      </div>
    </div>

    <div class="site-group" id="reddit-group">
      <div class="site-row" id="reddit-row">
        <svg class="site-icon" width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="12" fill="#FF4500" />
          <path
            d="M20 12C20 11.2 19.4 10.6 18.6 10.6C18.2 10.6 17.9 10.8 17.7 11C16.5 10.2 14.9 9.6 13.2 9.5L14 6.1L16.4 6.6C16.4 7.2 16.9 7.6 17.5 7.6C18.1 7.6 18.6 7.1 18.6 6.5C18.6 5.9 18.1 5.4 17.5 5.4C17.1 5.4 16.7 5.6 16.5 6L13.8 5.4C13.7 5.4 13.5 5.5 13.5 5.7L12.6 9.5C10.8 9.6 9.2 10.1 8 11C7.8 10.8 7.5 10.6 7.1 10.6C6.3 10.6 5.7 11.2 5.7 12C5.7 12.5 6 13 6.4 13.2C6.4 13.4 6.4 13.6 6.4 13.8C6.4 16.2 8.9 18.2 12 18.2C15.1 18.2 17.6 16.2 17.6 13.8C17.6 13.6 17.6 13.4 17.6 13.2C18 13 20 12.5 20 12Z"
            fill="#FFFFFF" />
          <circle cx="9.5" cy="13" r="1.2" fill="#FF4500" />
          <circle cx="14.5" cy="13" r="1.2" fill="#FF4500" />
          <path d="M9.8 15.8C10.4 16.4 11.2 16.6 12 16.6C12.8 16.6 13.6 16.4 14.2 15.8" stroke="#FF4500"
            stroke-width="0.8" stroke-linecap="round" fill="none" />
        </svg>
        <span class="site-label">Reddit</span>
        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 9L12 15L18 9" stroke="#888888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <label class="switch switch-sm">
          <input type="checkbox" id="toggle-reddit">
          <span class="slider"></span>
        </label>
      </div>
      <div class="element-list" id="reddit-elements">
        <label class="element-item">
          <input type="checkbox" id="rd-feed" class="element-checkbox">
          <span class="checkmark"></span>
          <span class="element-label">Home Feed</span>
        </label>
        <label class="element-item">
          <input type="checkbox" id="rd-sidebar" class="element-checkbox">
          <span class="checkmark"></span>
          <span class="element-label">Sidebar / Trending</span>
        </label>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
